<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${list.title}"></title>

    <!-- Bibliotecas Externas -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Seu Arquivo CSS Refatorado -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container py-5">
    <!-- Cabeçalho de Navegação -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="/view/home" class="btn btn-outline-secondary btn-sm border-0">
            <i class="bi bi-chevron-left"></i> Home
        </a>
        <span class="text-muted small">Avant Tech Jr Case &bull; <span th:text="${list.title}"></span></span>
    </div>

    <!-- Título e Descrição da Lista -->
    <div class="mb-5">
        <form th:action="@{/view/lists/{id}/update(id=${list.id})}" method="post" class="row g-3 align-items-end">
            <div class="col-lg-4">
                <label class="form-label text-muted small fw-bold">NOME DA LISTA</label>
                <!-- Usando a nova classe .list-title-input do style.css -->
                <input type="text" name="title" th:value="${list.title}" class="form-control list-title-input">
            </div>
            <div class="col-lg-6">
                <input type="text" name="description" th:value="${list.description}" class="form-control border-0 bg-transparent p-0 text-muted shadow-none" placeholder="Adicione uma descrição para esta lista...">
            </div>
            <div class="col-lg-2 text-end">
                <button type="submit" class="btn btn-dark btn-sm rounded-pill px-4">Salvar Alterações</button>
            </div>
        </form>
    </div>

    <div class="row">
        <!-- Coluna Esquerda: Formulário de Criação -->
        <div class="col-lg-4 mb-4">
            <div class="card border-0 shadow-sm p-4 rounded-4 position-sticky" style="top: 20px;">
                <h5 class="mb-4 fw-bold">Nova Tarefa</h5>
                <form th:action="@{/view/tasks/create}" method="post">
                    <input type="hidden" name="listId" th:value="${list.id}">
                    <div class="mb-3">
                        <input type="text" name="title" class="form-control bg-light border-0 py-2" placeholder="O que precisa ser feito?" required>
                    </div>
                    <div class="mb-3">
                        <select name="status" class="form-select bg-light border-0">
                            <option value="PENDENTE">Pendente</option>
                            <option value="EM_ANDAMENTO">Em Andamento</option>
                            <option value="CONCLUIDA">Concluída</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-muted">Prazo Final</label>
                        <input type="datetime-local" name="deadline" class="form-control bg-light border-0">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Criar Tarefa</button>
                </form>
            </div>
        </div>

        <!-- Coluna Direita: Listagem de Cards -->
        <div class="col-lg-8">
            <div th:if="${tasks.isEmpty()}" class="text-center py-5">
                <i class="bi bi-clipboard2-check text-muted display-1 opacity-25"></i>
                <p class="mt-3 text-muted">Nada por aqui. Comece criando uma tarefa!</p>
            </div>

            <div class="row g-3">
                <div class="col-12" th:each="task : ${tasks}">
                    <!-- Card com Borda Dinâmica -->
                    <div class="card task-card shadow-sm"
                         th:classappend="${task.status.toString() == 'PENDENTE' ? 'border-pendente' : (task.status.toString() == 'EM_ANDAMENTO' ? 'border-andamento' : 'border-concluida')}">

                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <!-- Badge com Cor Dinâmica -->
                                    <span class="badge-status mb-2 d-inline-block"
                                          th:classappend="${task.status.toString() == 'PENDENTE' ? 'bg-pendente' : (task.status.toString() == 'EM_ANDAMENTO' ? 'bg-andamento' : 'bg-concluida')}"
                                          th:text="${task.status}">
                                    </span>

                                    <h5 class="task-title fw-bold mb-1" th:text="${task.title}"></h5>
                                    <p class="text-muted small mb-3" th:text="${task.description != null && !task.description.isEmpty() ? task.description : 'Sem descrição.'}"></p>

                                    <div class="deadline-text">
                                        <i class="bi bi-calendar-event me-1"></i>
                                        <span th:text="${task.deadline != null ? #temporals.format(task.deadline, 'dd/MM/yyyy HH:mm') : 'Sem prazo'}"></span>
                                    </div>
                                </div>

                                <div class="d-flex gap-2">
                                    <form th:action="@{/view/tasks/{id}/update(id=${task.id})}" method="post" th:if="${task.status.toString() != 'CONCLUIDA'}">
                                        <input type="hidden" name="listId" th:value="${list.id}">
                                        <input type="hidden" name="title" th:value="${task.title}">
                                        <input type="hidden" name="status" value="CONCLUIDA">
                                        <button type="submit" class="btn btn-action btn-outline-success">
                                            <i class="bi bi-check2"></i>
                                        </button>
                                    </form>

                                    <button class="btn btn-action btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="'#editModal' + ${task.id}">
                                        <i class="bi bi-pencil-square"></i>
                                    </button>

                                    <form th:action="@{/view/tasks/{id}/delete(id=${task.id})}" method="post" onsubmit="return confirm('Excluir esta tarefa?')">
                                        <input type="hidden" name="listId" th:value="${list.id}">
                                        <button type="submit" class="btn btn-action btn-outline-danger">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="modal fade" th:id="'editModal' + ${task.id}" tabindex="-1">
                        <div class="modal-dialog modal-dialog-centered">
                            <div class="modal-content border-0 shadow-lg rounded-4">
                                <form th:action="@{/view/tasks/{id}/update(id=${task.id})}" method="post">
                                    <div class="modal-header border-0 pt-4 px-4">
                                        <h5 class="fw-bold">Editar Tarefa</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body p-4">
                                        <input type="hidden" name="listId" th:value="${list.id}">
                                        <div class="mb-3">
                                            <label class="form-label small fw-bold">Título</label>
                                            <input type="text" name="title" th:value="${task.title}" class="form-control border-0 bg-light py-2" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label small fw-bold">Descrição</label>
                                            <textarea name="description" class="form-control border-0 bg-light" rows="3" th:text="${task.description}"></textarea>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label small fw-bold">Status</label>
                                                <select name="status" class="form-select border-0 bg-light">
                                                    <option value="PENDENTE" th:selected="${task.status.toString() == 'PENDENTE'}">Pendente</option>
                                                    <option value="EM_ANDAMENTO" th:selected="${task.status.toString() == 'EM_ANDAMENTO'}">Em Andamento</option>
                                                    <option value="CONCLUIDA" th:selected="${task.status.toString() == 'CONCLUIDA'}">Concluída</option>
                                                </select>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label small fw-bold">Prazo</label>
                                                <input type="datetime-local" name="deadline" th:value="${task.deadline}" class="form-control border-0 bg-light">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="modal-footer border-0 pb-4 px-4">
                                        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                                        <button type="submit" class="btn btn-primary rounded-pill px-4">Salvar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
