<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - Minhas Listas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-check2-all"></i> Task Manager</span>
        <div class="d-flex align-items-center">
            <span class="text-light me-3" th:text="'Olá, ' + ${userName}">Usuário</span>
            <a href="/view/login" class="btn btn-sm btn-outline-danger">Sair</a>
        </div>
    </div>
</nav>

<div class="container">

    <!-- SEÇÃO: Criar Nova Lista -->
    <div class="card shadow-sm mb-5 border-0">
        <div class="card-header bg-primary text-white py-3">
            <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Nova Lista de Tarefas</h5>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/view/lists/create}" method="post" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Título</label>
                    <input type="text" name="title" class="form-control" placeholder="Ex: Faculdade, Trabalho..." required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Descrição (opcional)</label>
                    <input type="text" name="description" class="form-control" placeholder="Sobre o que é esta lista?">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-success w-100">Criar Lista</button>
                </div>
            </form>
        </div>
    </div>

    <h4 class="mb-4 text-secondary">Minhas Listas</h4>

    <div class="row">
        <!-- Loop do Thymeleaf pelas listas -->
        <div class="col-md-4 mb-4" th:each="list : ${lists}">
            <div class="card h-100 shadow-sm border-0 transition-hover">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title text-primary mb-0" th:text="${list.title}">Título</h5>
                        <!-- Ícone de indicação de tarefas (estético) -->
                        <i class="bi bi-folder2-open text-muted"></i>
                    </div>
                    <p class="card-text text-muted small" th:text="${list.description != null && !list.description.isEmpty() ? list.description : 'Sem descrição informada.'}">Descrição</p>

                    <hr class="text-light">

                    <p class="small text-secondary mb-0">
                        <i class="bi bi-calendar3"></i> Criada em:
                        <span th:text="${#temporals.format(list.createdAt, 'dd/MM/yyyy')}">01/01/2024</span>
                    </p>
                </div>
                <div class="card-footer bg-white border-0 pb-3">
                    <a th:href="@{/view/lists/{id}(id=${list.id})}" class="btn btn-outline-primary w-100 stretched-link">
                        Gerenciar Tarefas <i class="bi bi-arrow-right-short"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="col-12 text-center py-5" th:if="${lists.isEmpty()}">
            <div class="display-1 text-muted opacity-25">
                <i class="bi bi-clipboard-x"></i>
            </div>
            <p class="lead text-muted mt-3">Você ainda não criou nenhuma lista de tarefas.</p>
        </div>
    </div>
</div>

<style>
    .transition-hover:hover {
        transform: translateY(-5px);
        transition: transform 0.3s ease;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
    }
</style>

</body>
</html>
