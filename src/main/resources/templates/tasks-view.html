<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${list.title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .status-PENDENTE { color: #dc3545; font-weight: bold; }
        .status-EM_ANDAMENTO { color: #ffc107; font-weight: bold; }
        .status-CONCLUIDA { color: #198754; font-weight: bold; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-4">
    <a href="/view/home" class="btn btn-link mb-3"><i class="bi bi-arrow-left"></i> Voltar para Home</a>

    <!-- SEÇÃO: Editar Lista -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/view/lists/{id}/update(id=${list.id})}" method="post" class="row g-2 align-items-center">
                <div class="col-md-3">
                    <input type="text" name="title" th:value="${list.title}" class="form-control form-control-lg fw-bold" placeholder="Título da Lista">
                </div>
                <div class="col-md-7">
                    <input type="text" name="description" th:value="${list.description}" class="form-control" placeholder="Descrição">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Atualizar Lista</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SEÇÃO: Adicionar Tarefa -->
    <div class="card shadow-sm mb-4 border-start border-success border-4">
        <div class="card-body">
            <h6 class="card-title text-success"><i class="bi bi-plus-circle"></i> Nova Tarefa</h6>
            <form th:action="@{/view/tasks/create}" method="post" class="row g-2">
                <input type="hidden" name="listId" th:value="${list.id}"> <!-- ID da lista oculta -->
                <div class="col-md-4">
                    <input type="text" name="title" class="form-control" placeholder="Título da tarefa" required>
                </div>
                <div class="col-md-3">
                    <select name="status" class="form-select">
                        <option value="PENDENTE">Pendente</option>
                        <option value="EM_ANDAMENTO">Em Andamento</option>
                        <option value="CONCLUIDA">Concluída</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="datetime-local" name="deadline" class="form-control">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- TABELA DE TAREFAS -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Tarefa</th>
                    <th>Status</th>
                    <th>Prazo</th>
                    <th class="text-center">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="task : ${tasks}">
                    <td>
                        <div class="fw-bold" th:text="${task.title}"></div>
                        <small class="text-muted" th:text="${task.description}"></small>
                    </td>
                    <td>
                        <span th:class="'status-' + ${task.status}" th:text="${task.status}"></span>
                    </td>
                    <td th:text="${task.deadline != null ? #temporals.format(task.deadline, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                    <td class="text-center">
                        <!-- Botões de exemplo para futuras implementações -->
                        <button class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
                <tr th:if="${tasks.isEmpty()}">
                    <td colspan="4" class="text-center py-4 text-muted">Essa lista ainda não tem tarefas.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
